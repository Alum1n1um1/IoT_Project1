version: '3.8'

services:
  # NVD Vulnerability Data Loader (Python)
  nvd-loader:
    build:
      context: ./tmp/app
      dockerfile: Dockerfile.python
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/iot_security"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot-security-network
    restart: "no"  # Run once on startup only

  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/iot_security
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      nvd-loader:
        condition: service_completed_successfully
    networks:
      - iot-security-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: iot_security
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - iot-security-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  iot-security-network:
    driver: bridge
